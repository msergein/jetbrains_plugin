name: Kotlin Lint Check

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod a+x ktlint
          ./ktlint "**/*.kt" --relative --reporter=checkstyle